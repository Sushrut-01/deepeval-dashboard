<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Inter',sans-serif;background:#1F2937;color:#F9FAFB}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.04);border-radius:10px}
::-webkit-scrollbar-thumb{
  background-color:rgba(255,255,255,.34);
  background-image:
    radial-gradient(circle 1.7px at 4px 4px,  #6366F1 99%, transparent 100%),
    radial-gradient(circle 1.7px at 11px 4px, #10B981 99%, transparent 100%),
    radial-gradient(circle 1.7px at 4px 11px, #F59E0B 99%, transparent 100%),
    radial-gradient(circle 1.7px at 11px 11px,#A78BFA 99%, transparent 100%);
  background-size:15px 15px;
  background-repeat:repeat;
  background-clip:padding-box;
  border:2px solid transparent;
  border-radius:10px;
}
::-webkit-scrollbar-thumb:hover{background-color:rgba(255,255,255,.5)}
::-webkit-scrollbar-corner{background:transparent}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .22s ease}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer;transition:all .15s}
table{width:100%;border-collapse:collapse}
th{padding:8px 13px;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.09em;text-align:left;white-space:nowrap;border-right:1px solid #374151;border-bottom:2px solid #374151;background:#1a2234}
th:last-child{border-right:none}
td{padding:8px 13px;font-size:13px;border-right:1px solid #2D3748;color:#D1D5DB;vertical-align:middle}
td:last-child{border-right:none}
tbody tr{border-bottom:1px solid #2D3748;transition:background .1s}
tbody tr:hover{background:#1e2d45;box-shadow:inset 3px 0 0 #6366F1}

.tab{padding:8px 16px;font-size:13px;font-weight:600;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.on{color:#818CF8;border-bottom-color:#6366F1;background:#111827}

.kv{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #2D3748;font-size:12px}

.kk{color:#9CA3AF;min-width:130px;font-size:11px;font-weight:600}

/* --- ACTIVITY HEATMAP (GitHub-style calendar) --------------------------- */
function ActivityHeatmap(props) {
  var dailyData = props.data || [];
  // Build date->count map
  var dateMap = {};
  dailyData.forEach(function(d) { dateMap[d.date] = d.runs || 0; });

  var weeks = 26;
  var cells = [];
  var today = new Date();
  for (var i = weeks * 7 - 1; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var dateStr = d.toISOString().slice(0, 10);
    var count = dateMap[dateStr] || 0;
    var weekCol = Math.floor(i / 7);
    var dayRow  = 6 - (i % 7);
    cells.push({ date: dateStr, count: count, col: weeks - 1 - weekCol, row: dayRow });
  }
  var maxCount = Math.max.apply(null, cells.map(function(c) { return c.count; }).concat([1]));
  var CS = 12, GAP = 3;
  var W = weeks * (CS + GAP);
  var H = 7 * (CS + GAP);

  var MONTH_LABELS = [];
  var seenMonths = {};
  cells.forEach(function(c) {
    var mo = c.date.slice(0, 7);
    if (!seenMonths[mo] && c.row === 0) {
      seenMonths[mo] = true;
      MONTH_LABELS.push({ label: c.date.slice(5, 7) + "/" + c.date.slice(2, 4), col: c.col });
    }
  });

  return React.createElement("div", null,
    React.createElement("svg", { width: W + 30, height: H + 24, style: { overflow: "visible" } },
      // Month labels
      MONTH_LABELS.map(function(ml, i) {
        return React.createElement("text", { key: i, x: ml.col * (CS + GAP), y: H + 16, fontSize: 9, fill: C.muted }, ml.label);
      }),
      // Day labels
      ["Su","Mo","Tu","We","Th","Fr","Sa"].map(function(day, r) {
        return React.createElement("text", { key: r, x: W + 4, y: r * (CS + GAP) + CS, fontSize: 9, fill: C.muted }, day);
      }),
      // Cells
      cells.map(function(cell, i) {
        var intensity = cell.count === 0 ? 0 : 0.2 + 0.8 * (cell.count / maxCount);
        var fillColor = cell.count === 0 ? C.borderSoft : "rgba(99,102,241," + intensity.toFixed(2) + ")";
        return React.createElement("rect", {
          key: i,
          x: cell.col * (CS + GAP), y: cell.row * (CS + GAP),
          width: CS, height: CS, rx: 2,
          fill: fillColor,
          style: { cursor: "pointer" },
          onClick: function() { toast(cell.date + ": " + cell.count + " run" + (cell.count !== 1 ? "s" : "")); }
        },
          React.createElement("title", null, cell.date + ": " + cell.count + " run" + (cell.count !== 1 ? "s" : ""))
        );
      })
    ),
    React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6, marginTop: 8, fontSize: 10, color: C.muted } },
      "Less",
      [0, 0.25, 0.5, 0.75, 1].map(function(v, i) {
        return React.createElement("div", { key: i, style: { width: 11, height: 11, borderRadius: 2, background: v === 0 ? C.borderSoft : "rgba(99,102,241," + (0.2 + 0.8 * v).toFixed(2) + ")" } });
      }),
      "More"
    )
  );
}
