<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="3" y="3" width="194" height="194" rx="42" fill="url(#bgGrad)" stroke="#374151" stroke-width="2"/>

  <!-- lattice weave: outer diamond edges, each leg in one evaluator's color -->
  <g fill="none" stroke-width="3.5" stroke-linecap="round">
    <path d="M100,34 L166,100" stroke="#6366F1" opacity="0.9"/>
    <path d="M166,100 L100,166" stroke="#10B981" opacity="0.9"/>
    <path d="M100,166 L34,100" stroke="#F59E0B" opacity="0.9"/>
    <path d="M34,100 L100,34" stroke="#A78BFA" opacity="0.9"/>
  </g>

  <!-- inner crosshatch weave converging on the center -->
  <g fill="none" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M100,34 L100,166" stroke="#6366F1"/>
    <path d="M34,100 L166,100" stroke="#10B981"/>
    <path d="M58,58 L142,142" stroke="#F59E0B"/>
    <path d="M142,58 L58,142" stroke="#A78BFA"/>
  </g>

  <!-- evaluator nodes at the four points of the lattice -->
  <circle cx="100" cy="34"  r="10" fill="#6366F1"/>
  <circle cx="166" cy="100" r="10" fill="#10B981"/>
  <circle cx="100" cy="166" r="10" fill="#F59E0B"/>
  <circle cx="34"  cy="100" r="10" fill="#A78BFA"/>

  <!-- unifying core node where every evaluator's signal converges -->
  <circle cx="100" cy="100" r="16" fill="url(#coreGrad)" stroke="#111827" stroke-width="3"/>
  <circle cx="100" cy="100" r="6"  fill="#6366F1"/>
</svg>
